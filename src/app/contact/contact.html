<section class="contact-page">

    <!-- Background accents -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <!-- Header -->
    <div class="contact-header">
        <span class="tag">GET IN TOUCH</span>
        <h1>Let's Build Something <span class="highlight">Great</span> Together</h1>
        <p>
            Have a project in mind or just want to say hello? Fill out the form
            below or reach us directly — we usually reply within 24 hours.
        </p>
    </div>

    <div class="contact-content">

        <!-- Left: Contact Info -->
        <div class="contact-info">

            <div class="info-card" *ngFor="let item of contactInfo">
                <div class="icon-wrap"><i class="ti {{ item.icon }}"></i></div>
                <div class="info-text">
                    <h4>{{ item.title }}</h4>
                    <p>{{ item.value }}</p>
                </div>
            </div>

            <div class="social-block">
                <p class="social-label">Follow us</p>
                <div class="social-icons">
                    <a [href]="social.url" target="_blank" rel="noopener noreferrer" class="social-btn"
                        *ngFor="let social of socials">
                        <i class="ti {{ social.icon }}"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Right: Contact Form -->
        <div class="contact-form-wrap">
            <form class="contact-form" [formGroup]="contactForm" (ngSubmit)="onSubmit()">

                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input id="name" type="text" formControlName="name" placeholder="Enter your name" />
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input id="email" type="email" formControlName="email" placeholder="Enter your mail" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input id="subject" type="text" formControlName="subject" placeholder="Let's talk about..." />
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" formControlName="message"
                        placeholder="Tell us about your project..."></textarea>
                </div>

                <button type="submit" class="submit-btn" [disabled]="contactForm.invalid || submitting">
                    <span *ngIf="!submitting">Send Message</span>
                    <span *ngIf="submitting">Sending...</span>
                </button>

                <p class="success-msg" *ngIf="submitted">✓ Message sent successfully. We'll be in touch soon!</p>
            </form>
        </div>

    </div>
</section>
